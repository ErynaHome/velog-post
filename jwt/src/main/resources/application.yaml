spring:
  application:
    name: jwt

  # ================================
  # 파일 업로드 크기 제한
  # ================================
  servlet:
    multipart:
      max-file-size: 15MB      # 파일 1개 최대 5MB
      max-request-size: 15MB   # 요청 전체 최대 5MB

  # ================================
  # MySQL 연결 설정
  # ================================
  datasource:
    url: jdbc:mysql://localhost:3306/foodbot?serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ================================
  # JPA 설정
  # ================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  ai:
    google:
      genai:
        api-key: AIzaSyAlFChb-9Yp1MPpHt5xSlpsYry5XVCiLU8
        chat:
          options:
            model: gemini-2.5-flash-lite

# ================================
# Hibernate SQL + 바인딩 값 출력
# ================================
logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace