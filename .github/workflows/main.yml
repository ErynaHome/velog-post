name: Push to Velog

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Check blog.md
        run: |
          if [ ! -f blog.md ]; then
            echo "blog.md 파일이 없습니다."
            exit 1
          fi

      - name: Upload to Velog
        run: |
          CONTENT=$(cat blog.md)

          JSON=$(jq -n \
            --arg title "자동 생성 글" \
            --arg body "$CONTENT" \
            '{
              query: "mutation WritePost($title: String!, $body: String!, $tags: [String], $is_markdown: Boolean, $is_temp: Boolean, $is_private: Boolean) { writePost(title: $title, body: $body, tags: $tags, is_markdown: $is_markdown, is_temp: $is_temp, is_private: $is_private) { id title url_slug } }",
              variables: {
                title: $title,
                body: $body,
                tags: ["AI", "자동화"],
                is_markdown: true,
                is_temp: false,
                is_private: false
              }
            }')

          RESPONSE=$(curl -s -X POST https://v2.velog.io/graphql \
            -H "Content-Type: application/json" \
            -H "Cookie: access_token=${{ secrets.VELOG_TOKEN }}" \
            -d "$JSON")

          echo "$RESPONSE" | jq .